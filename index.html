  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

"preview-wrap\" ref=\"{{ setWrap }}\" style=\"flex:2 1 520px;min-width:300px;display:flex;flex-direction:column;align-items:center;padding:30px 24px;background:#dedacf;\">\n      <div class=\"no-print\" style=\"font-family:'Cinzel',serif;font-size:12px;letter-spacing:0.22em;color:#8e887a;margin-bottom:18px;\">PREVIEW<\u002Fdiv>\n      <div class=\"sheet-box\" style=\"position:relative;width:{{ boxW }}px;height:{{ boxH }}px;\">\n        <div class=\"print-sheet\" style=\"position:absolute;top:0;left:0;width:816px;height:1056px;transform:scale({{ scale }});transform-origin:top left;background:#f3f0ec;color:#2a2a2a;padding:64px 62px 60px;box-shadow:0 22px 60px rgba(40,33,20,.22);display:flex;flex-direction:column;overflow:hidden;\">\n\n          <sc-if value=\"{{ hasArt }}\" hint-placeholder-val=\"{{ true }}\">\n            <img src=\"{{ artSrc }}\" alt=\"\" style=\"{{ artStyle }}\">\n          <\u002Fsc-if>\n\n          <div style=\"font-family:'Cinzel',serif;font-weight:500;font-size:60px;letter-spacing:0.16em;text-indent:0.16em;color:#2a2a2a;line-height:1;\">INVOICE<\u002Fdiv>\n\n          <div style=\"margin-top:22px;font-family:'Alegreya Sans',sans-serif;font-weight:300;font-size:16.5px;letter-spacing:0.03em;color:#6f6a60;line-height:1.55;\">\n            <div>{{ dateLong }}<\u002Fdiv>\n            <div>Invoice #{{ invoiceNumValue }}<\u002Fdiv>\n          <\u002Fdiv>\n\n          <div style=\"margin-top:30px;\">\n            <div style=\"font-family:'Cinzel',serif;font-weight:600;font-size:14px;letter-spacing:0.12em;color:#2a2a2a;\">INVOICE TO:<\u002Fdiv>\n            <div style=\"font-family:'Cinzel',serif;font-weight:400;font-size:23px;color:#2a2a2a;margin-top:9px;\">{{ clientName }}<\u002Fdiv>\n          <\u002Fdiv>\n\n          <div style=\"margin-top:62px;\">\n            <div style=\"display:flex;justify-content:space-between;align-items:center;border:1px solid #2a2a2a;padding:13px 22px;font-family:'Cinzel',serif;font-weight:500;font-size:13px;letter-spacing:0.18em;color:#2a2a2a;\">\n              <div>DESCRIPTION<\u002Fdiv>\n              <div>PRICE<\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"display:flex;justify-content:space-between;align-items:baseline;padding:26px 22px 0;font-family:'Alegreya Sans',sans-serif;font-weight:400;font-size:18px;color:#14110d;\">\n              <div>{{ description }}<\u002Fdiv>\n              <div>{{ priceFmt }}<\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"height:1px;background:#2a2a2a;margin-top:24px;\"><\u002Fdiv>\n          <\u002Fdiv>\n\n          <div style=\"flex:1;\"><\u002Fdiv>\n\n          <div>\n            <div style=\"font-family:'Cinzel',serif;font-weight:600;font-size:14px;letter-spacing:0.12em;color:#2a2a2a;\">SEND PAYMENTS TO:<\u002Fdiv>\n            <div style=\"font-family:'Alegreya Sans',sans-serif;font-weight:300;font-size:16.5px;color:#6f6a60;line-height:1.6;margin-top:12px;\">\n              <div>{{ providerName }}<\u002Fdiv>\n              <div>paypal account: {{ paypal }}<\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"display:flex;justify-content:flex-end;align-items:baseline;gap:34px;margin-top:34px;\">\n              <div style=\"font-family:'Cinzel',serif;font-weight:500;font-size:14px;letter-spacing:0.16em;color:#2a2a2a;\">TOTAL AMOUNT<\u002Fdiv>\n              <div style=\"font-family:'Alegreya Sans',sans-serif;font-weight:500;font-size:18px;color:#14110d;\">{{ priceFmt }}<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n  <\u002Fdiv>\n\n  <sc-if value=\"{{ modalClients }}\" hint-placeholder-val=\"{{ false }}\">\n    <div class=\"no-print\" onclick=\"{{ closeModal }}\" style=\"position:fixed;inset:0;background:rgba(35,30,20,.42);display:flex;align-items:center;justify-content:center;z-index:20;padding:24px;\">\n      <div onclick=\"{{ stop }}\" style=\"background:#fffdf7;border-radius:16px;width:100%;max-width:540px;max-height:84vh;overflow:auto;padding:30px 30px 26px;box-shadow:0 30px 80px rgba(30,24,14,.4);\">\n        <div style=\"display:flex;justify-content:space-between;align-items:center;margin-bottom:22px;\">\n          <div style=\"font-family:'Cinzel',serif;font-size:20px;letter-spacing:0.12em;\">CLIENTS<\u002Fdiv>\n          <button onclick=\"{{ closeModal }}\" style=\"border:none;background:none;font-size:24px;color:#9a907a;cursor:pointer;line-height:1;\">×<\u002Fbutton>\n        <\u002Fdiv>\n        <div style=\"display:flex;flex-direction:column;gap:16px;\">\n          <sc-for list=\"{{ clientRows }}\" as=\"row\" hint-placeholder-count=\"2\">\n            <div style=\"border:1px solid #ece4d2;border-radius:12px;padding:14px;background:#fffefa;\">\n              <div style=\"display:flex;gap:10px;align-items:center;\">\n                <input value=\"{{ row.name }}\" oninput=\"{{ row.onName }}\" placeholder=\"Client name\" style=\"flex:1;border:1px solid #d8d0bf;border-radius:9px;padding:10px 12px;font-size:15px;color:#2a2620;\">\n                <div style=\"display:flex;align-items:center;gap:6px;\">\n                  <span style=\"font-size:12px;color:#a89e85;letter-spacing:0.08em;\">NEXT&nbsp;#<\u002Fspan>\n                  <input type=\"number\" value=\"{{ row.nextNum }}\" oninput=\"{{ row.onNum }}\" style=\"width:70px;border:1px solid #d8d0bf;border-radius:9px;padding:10px;font-size:15px;color:#2a2620;\">\n                <\u002Fdiv>\n                <button onclick=\"{{ row.onDelete }}\" style=\"border:1px solid #e3cfc7;background:#fff;color:#b06a55;border-radius:9px;padding:10px 12px;font-size:13px;cursor:pointer;\">Delete<\u002Fbutton>\n              <\u002Fdiv>\n\n              <div style=\"display:flex;align-items:flex-start;gap:14px;margin-top:14px;\">\n                <div style=\"width:96px;height:96px;border-radius:10px;border:1px solid #e6ddc9;background:#f3f0ec;flex:0 0 auto;position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center;\">\n                  <sc-if value=\"{{ row.hasArt }}\" hint-placeholder-val=\"{{ true }}\">\n                    <img src=\"{{ row.artSrc }}\" alt=\"\" style=\"max-width:86%;max-height:86%;object-fit:contain;\">\n                  <\u002Fsc-if>\n                  <sc-if value=\"{{ row.noArt }}\" hint-placeholder-val=\"{{ false }}\">\n                    <span style=\"font-size:11px;color:#b3a98f;letter-spacing:0.08em;\">NO ART<\u002Fspan>\n                  <\u002Fsc-if>\n                <\u002Fdiv>\n\n                <div style=\"flex:1;display:flex;flex-direction:column;gap:9px;\">\n                  <div style=\"display:flex;flex-wrap:wrap;gap:6px;\">\n                    <sc-for list=\"{{ row.artChoices }}\" as=\"ch\" hint-placeholder-count=\"4\">\n                      <button onclick=\"{{ ch.onClick }}\" style=\"{{ ch.style }}\">{{ ch.label }}<\u002Fbutton>\n                    <\u002Fsc-for>\n                  <\u002Fdiv>\n                  <label style=\"display:inline-flex;align-items:center;justify-content:center;gap:6px;border:1px dashed #cabfa6;background:#faf7ee;color:#6f6755;border-radius:8px;padding:8px;font-size:13px;cursor:pointer;letter-spacing:0.03em;\">\n                    Upload image…\n                    <input type=\"file\" accept=\"image/*\" onchange=\"{{ row.onUpload }}\" style=\"display:none;\">\n                  <\u002Flabel>\n                <\u002Fdiv>\n              <\u002Fdiv>\n\n              <sc-if value=\"{{ row.hasArt }}\" hint-placeholder-val=\"{{ true }}\">\n                <div style=\"display:flex;flex-wrap:wrap;gap:14px;margin-top:13px;\">\n                  <label style=\"flex:1 1 130px;font-size:12px;color:#8a8068;letter-spacing:0.06em;\">SIZE\n                    <input type=\"range\" min=\"120\" max=\"420\" value=\"{{ row.artW }}\" oninput=\"{{ row.onW }}\" style=\"width:100%;accent-color:#8a7d5a;\">\n                  <\u002Flabel>\n                  <label style=\"flex:1 1 130px;font-size:12px;color:#8a8068;letter-spacing:0.06em;\">DOWN\n                    <input type=\"range\" min=\"40\" max=\"300\" value=\"{{ row.artTop }}\" oninput=\"{{ row.onTop }}\" style=\"width:100%;accent-color:#8a7d5a;\">\n                  <\u002Flabel>\n                  <label style=\"flex:1 1 130px;font-size:12px;color:#8a8068;letter-spacing:0.06em;\">RIGHT\n                    <input type=\"range\" min=\"0\" max=\"220\" value=\"{{ row.artRight }}\" oninput=\"{{ row.onRight }}\" style=\"width:100%;accent-color:#8a7d5a;\">\n                  <\u002Flabel>\n                <\u002Fdiv>\n              <\u002Fsc-if>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n        <button onclick=\"{{ addClient }}\" style=\"margin-top:18px;width:100%;border:1px dashed #cabfa6;background:#faf7ee;color:#6f6755;border-radius:10px;padding:12px;font-size:14px;cursor:pointer;letter-spacing:0.05em;\">+ Add client<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <sc-if value=\"{{ modalSettings }}\" hint-placeholder-val=\"{{ false }}\">\n    <div class=\"no-print\" onclick=\"{{ closeModal }}\" style=\"position:fixed;inset:0;background:rgba(35,30,20,.42);display:flex;align-items:center;justify-content:center;z-index:20;padding:24px;\">\n      <div onclick=\"{{ stop }}\" style=\"background:#fffdf7;border-radius:16px;width:100%;max-width:560px;max-height:86vh;overflow:auto;padding:30px 30px 26px;box-shadow:0 30px 80px rgba(30,24,14,.4);\">\n        <div style=\"display:flex;justify-content:space-between;align-items:center;margin-bottom:22px;\">\n          <div style=\"font-family:'Cinzel',serif;font-size:20px;letter-spacing:0.12em;\">SETTINGS<\u002Fdiv>\n          <button onclick=\"{{ closeModal }}\" style=\"border:none;background:none;font-size:24px;color:#9a907a;cursor:pointer;line-height:1;\">×<\u002Fbutton>\n        <\u002Fdiv>\n\n        <div style=\"font-family:'Cinzel',serif;font-size:12.5px;letter-spacing:0.2em;color:#a89e85;margin-bottom:12px;\">YOUR DETAILS<\u002Fdiv>\n        <div style=\"display:flex;flex-direction:column;gap:12px;margin-bottom:28px;\">\n          <input value=\"{{ providerName }}\" oninput=\"{{ onProvider }}\" placeholder=\"Your name\" style=\"border:1px solid #d8d0bf;border-radius:9px;padding:11px 13px;font-size:15px;color:#2a2620;\">\n          <input value=\"{{ paypal }}\" oninput=\"{{ onPaypal }}\" placeholder=\"PayPal email\" style=\"border:1px solid #d8d0bf;border-radius:9px;padding:11px 13px;font-size:15px;color:#2a2620;\">\n        <\u002Fdiv>\n\n        <div style=\"font-family:'Cinzel',serif;font-size:12.5px;letter-spacing:0.2em;color:#a89e85;margin-bottom:12px;\">SESSIONS &amp; PRICES<\u002Fdiv>\n        <div style=\"display:flex;flex-direction:column;gap:10px;\">\n          <sc-for list=\"{{ serviceRows }}\" as=\"row\" hint-placeholder-count=\"4\">\n            <div style=\"display:flex;gap:10px;align-items:center;\">\n              <div style=\"display:flex;align-items:center;gap:6px;flex:1;\">\n                <input type=\"number\" value=\"{{ row.minutes }}\" oninput=\"{{ row.onMin }}\" style=\"width:80px;border:1px solid #d8d0bf;border-radius:9px;padding:10px;font-size:15px;color:#2a2620;\">\n                <span style=\"font-size:14px;color:#7a7259;\">min<\u002Fspan>\n              <\u002Fdiv>\n              <div style=\"display:flex;align-items:center;gap:6px;flex:1;\">\n                <span style=\"font-size:15px;color:#7a7259;\">$<\u002Fspan>\n                <input type=\"number\" value=\"{{ row.price }}\" oninput=\"{{ row.onPrice }}\" style=\"width:96px;border:1px solid #d8d0bf;border-radius:9px;padding:10px;font-size:15px;color:#2a2620;\">\n              <\u002Fdiv>\n              <button onclick=\"{{ row.onDelete }}\" style=\"border:1px solid #e3cfc7;background:#fff;color:#b06a55;border-radius:9px;padding:10px 12px;font-size:13px;cursor:pointer;\">Delete<\u002Fbutton>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n        <button onclick=\"{{ addService }}\" style=\"margin-top:16px;width:100%;border:1px dashed #cabfa6;background:#faf7ee;color:#6f6755;border-radius:10px;padding:12px;font-size:14px;cursor:pointer;letter-spacing:0.05em;\">+ Add session type<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:&quot;100%&quot;,&quot;height&quot;:&quot;100%&quot;},&quot;accent&quot;:{&quot;editor&quot;:&quot;color&quot;,&quot;default&quot;:&quot;#6b5a52&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;options&quot;:[&quot;#6b5a52&quot;,&quot;#2a2a2a&quot;,&quot;#4a5a4a&quot;,&quot;#3b1d25&quot;,&quot;#5e5446&quot;]},&quot;dateFormat&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;default&quot;:&quot;Weekday, Mon. D, YYYY&quot;,&quot;options&quot;:[&quot;Weekday, Mon. D, YYYY&quot;,&quot;Weekday, Month D, YYYY&quot;,&quot;Mon. D, YYYY&quot;],&quot;tsType&quot;:&quot;string&quot;}}\">\nconst KEY = 'invoiceApp.v1';\nconst WD = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];\nconst MO_SHORT = ['Jan.','Feb.','Mar.','Apr.','May','Jun.','Jul.','Aug.','Sep.','Oct.','Nov.','Dec.'];\nconst MO_LONG = ['January','February','March','April','May','June','July','August','September','October','November','December'];\n\nfunction todayISO(){\n  const d = new Date();\n  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');\n}\nfunction uid(p){ return (p||'id')+Date.now().toString(36)+Math.random().toString(36).slice(2,6); }\n\nclass Component extends DCLogic {\n  constructor(props){\n    super(props);\n    this.state = this.load();\n  }\n\n  load(){\n    try{\n      const s = JSON.parse(localStorage.getItem(KEY));\n      if(s && Array.isArray(s.clients) && s.clients.length){\n        return Object.assign(this.defaults(), s, { modal:null, scale:0.6, boxW:490, boxH:634 });\n      }\n    }catch(e){}\n    return this.defaults();\n  }\n\n  defaults(){\n    return {\n      clients:[\n        {id:'jess', name:'Jessica Sampilo', nextNum:44, art:{type:'squiggle', src:'assets/squiggle.png', w:266, top:150, right:74}},\n        {id:'alec', name:'Alec Empinado Yu', nextNum:46, art:{type:'plants', src:'assets/plants.png', w:300, top:96, right:54}},\n      ],\n      services:[\n        {id:'s30', minutes:30, price:35},\n        {id:'s45', minutes:45, price:50},\n        {id:'s60', minutes:60, price:65},\n        {id:'s90', minutes:90, price:95},\n      ],\n      providerName:'Amelie Sun',\n      paypal:'amelie.t.sun@gmail.com',\n      clientId:'jess',\n      serviceId:'s60',\n      dateISO: todayISO(),\n      numOverride:null,\n      modal:null,\n      scale:0.6, boxW:490, boxH:634,\n    };\n  }\n\n  componentDidMount(){\n    this._measure = () => this.measure();\n    window.addEventListener('resize', this._measure);\n    this._after = () => this.afterPrint();\n    window.addEventListener('afterprint', this._after);\n    requestAnimationFrame(()=>this.measure());\n    setTimeout(()=>this.measure(), 250);\n  }\n  componentWillUnmount(){\n    window.removeEventListener('resize', this._measure);\n    window.removeEventListener('afterprint', this._after);\n  }\n  componentDidUpdate(){\n    const { modal, scale, boxW, boxH, ...rest } = this.state;\n    try{ localStorage.setItem(KEY, JSON.stringify(rest)); }catch(e){}\n  }\n\n  measure(){\n    if(!this.wrapEl) return;\n    const avail = this.wrapEl.clientWidth - 48;\n    let scale = Math.min(0.94, Math.max(0.26, avail/816));\n    this.setState({ scale, boxW: Math.round(816*scale), boxH: Math.round(1056*scale) });\n  }\n\n  current(){\n    const s = this.state;\n    const client = s.clients.find(c=>c.id===s.clientId) || s.clients[0];\n    const service = s.services.find(x=>x.id===s.serviceId) || s.services[0];\n    return { client, service };\n  }\n\n  selectClient(id){ this.setState({ clientId:id, numOverride:null }); }\n  selectService(id){ this.setState({ serviceId:id }); }\n  setDate(e){ this.setState({ dateISO: e.target.value }); }\n  setNum(e){\n    const v = e.target.value;\n    this.setState({ numOverride: v === '' ? null : parseInt(v,10) });\n  }\n\n  openClients(){ this.setState({ modal:'clients' }); }\n  openSettings(){ this.setState({ modal:'settings' }); }\n  closeModal(){ this.setState({ modal:null }); }\n\n  addClient(){\n    this.setState(s=>({ clients:[...s.clients, { id:uid('c'), name:'New Client', nextNum:1, art:{type:'squiggle', src:'assets/squiggle.png', w:266, top:150, right:74} }] }));\n  }\n\n  setArt(id, art){\n    this.setState(s=>({ clients: s.clients.map(c=> c.id===id ? Object.assign({}, c, { art }) : c) }));\n  }\n  chooseArtPreset(id, preset){\n    const presets = {\n      squiggle: {type:'squiggle', src:'assets/squiggle.png', w:266, top:150, right:74},\n      plants:   {type:'plants', src:'assets/plants.png', w:300, top:96, right:54},\n      none:     {type:'none', src:'', w:266, top:150, right:74},\n    };\n    const cur = (this.state.clients.find(c=>c.id===id)||{}).art || {};\n    const base = presets[preset];\n    // keep current position/size when just swapping preset art so adjustments persist\n    const keep = (cur.type && cur.type!=='none' && preset!=='none');\n    this.setArt(id, Object.assign({}, base, keep ? {w:cur.w, top:cur.top, right:cur.right} : {}));\n  }\n  uploadArt(id, e){\n    const file = e.target.files && e.target.files[0];\n    if(!file) return;\n    const reader = new FileReader();\n    reader.onload = () => {\n      const cur = (this.state.clients.find(c=>c.id===id)||{}).art || {};\n      const keep = (cur.type && cur.type!=='none');\n      this.setArt(id, {type:'custom', src:reader.result, w: keep?cur.w:300, top: keep?cur.top:110, right: keep?cur.right:60});\n    };\n    reader.readAsDataURL(file);\n  }\n  setArtField(id, field, value){\n    const cur = (this.state.clients.find(c=>c.id===id)||{}).art || {};\n    this.setArt(id, Object.assign({}, cur, { [field]: parseInt(value,10)||0 }));\n  }\n  updateClient(id, field, value){\n    this.setState(s=>({ clients: s.clients.map(c=> c.id===id ? Object.assign({}, c, { [field]: field==='nextNum' ? (parseInt(value,10)||0) : value }) : c) }));\n  }\n  deleteClient(id){\n    this.setState(s=>{\n      const clients = s.clients.filter(c=>c.id!==id);\n      const clientId = s.clientId===id ? (clients[0] ? clients[0].id : null) : s.clientId;\n      return { clients, clientId, numOverride: s.clientId===id ? null : s.numOverride };\n    });\n  }\n\n  addService(){\n    this.setState(s=>({ services:[...s.services, { id:uid('s'), minutes:60, price:65 }] }));\n  }\n  updateService(id, field, value){\n    this.setState(s=>({ services: s.services.map(x=> x.id===id ? Object.assign({}, x, { [field]: parseInt(value,10)||0 }) : x) }));\n  }\n  deleteService(id){\n    this.setState(s=>{\n      const services = s.services.filter(x=>x.id!==id);\n      const serviceId = s.serviceId===id ? (services[0] ? services[0].id : null) : s.serviceId;\n      return { services, serviceId };\n    });\n  }\n\n  generate(){ window.print(); }\n  afterPrint(){\n    this.setState(s=>{\n      const client = s.clients.find(c=>c.id===s.clientId);\n      if(!client) return {};\n      const used = s.numOverride!=null ? s.numOverride : client.nextNum;\n      const clients = s.clients.map(c=> c.id===s.clientId ? Object.assign({}, c, { nextNum: Number(used)+1 }) : c);\n      return { clients, numOverride:null };\n    });\n  }\n\n  fmtDate(iso){\n    if(!iso) return '';\n    const d = new Date(iso+'T00:00:00');\n    if(isNaN(d)) return iso;\n    const f = this.props.dateFormat || 'Weekday, Mon. D, YYYY';\n    const wd = WD[d.getDay()], day = d.getDate(), yr = d.getFullYear();\n    if(f === 'Mon. D, YYYY') return MO_SHORT[d.getMonth()] + ' ' + day + ', ' + yr;\n    if(f === 'Weekday, Month D, YYYY') return wd + ', ' + MO_LONG[d.getMonth()] + ' ' + day + ', ' + yr;\n    return wd + ', ' + MO_SHORT[d.getMonth()] + ' ' + day + ', ' + yr;\n  }\n\n  chipStyle(active, accent){\n    const base = \"display:flex;flex-direction:column;align-items:flex-start;gap:2px;border-radius:11px;padding:11px 16px;cursor:pointer;font-family:'Alegreya Sans',sans-serif;line-height:1.2;transition:all .14s;border:1px solid \";\n    if(active){\n      return base + accent + \";background:\" + accent + \";color:#f6efe6;box-shadow:0 6px 16px rgba(60,40,46,.26);\";\n    }\n    return base + \"#d8d0bf;background:#fffdf7;color:#4a4438;\";\n  }\n\n  renderVals(){\n    const s = this.state;\n    const accent = this.props.accent || '#3b1d25';\n    const { client, service } = this.current();\n    const price = service ? Number(service.price) : 0;\n    const minutes = service ? service.minutes : 0;\n    const numValue = (s.numOverride!=null && s.numOverride!=='') ? s.numOverride : (client ? client.nextNum : 1);\n    const priceFmt = 'USD $' + price.toFixed(2);\n\n    const cArt = (client && client.art) ? client.art : {type:'none'};\n    const hasArt = !!(cArt && cArt.type && cArt.type!=='none' && cArt.src);\n    const artStyle = 'position:absolute;top:'+(cArt.top||120)+'px;right:'+(cArt.right||70)+'px;width:'+(cArt.w||266)+'px;height:auto;pointer-events:none;';\n\n    const presetBtn = (active)=> 'border:1px solid '+(active?'#2a2a2a':'#d8d0bf')+';background:'+(active?'#2a2a2a':'#fff')+';color:'+(active?'#f3f0ec':'#5a5343')+';border-radius:8px;padding:7px 12px;font-size:12.5px;cursor:pointer;letter-spacing:0.04em;';\n    const artPresetList = [['squiggle','Squiggle'],['plants','Plants'],['none','None']];\n\n    const clientChips = s.clients.map(c=>({\n      name: c.name,\n      style: this.chipStyle(c.id===s.clientId, accent),\n      onClick: ()=>this.selectClient(c.id),\n    }));\n    const serviceChips = s.services.map(x=>({\n      label: x.minutes + ' min',\n      sub: '$' + x.price,\n      style: this.chipStyle(x.id===s.serviceId, accent),\n      onClick: ()=>this.selectService(x.id),\n    }));\n    const clientRows = s.clients.map(c=>{\n      const a = c.art || {type:'none'};\n      const has = !!(a.type && a.type!=='none' && a.src);\n      return {\n        name: c.name,\n        nextNum: c.nextNum,\n        onName: (e)=>this.updateClient(c.id,'name',e.target.value),\n        onNum: (e)=>this.updateClient(c.id,'nextNum',e.target.value),\n        onDelete: ()=>this.deleteClient(c.id),\n        hasArt: has,\n        noArt: !has,\n        artSrc: a.src || '',\n        artW: a.w || 266,\n        artTop: a.top || 120,\n        artRight: a.right || 70,\n        artChoices: artPresetList.map(([key,label])=>({\n          label,\n          style: presetBtn(a.type===key || (key==='none' && !has)),\n          onClick: ()=>this.chooseArtPreset(c.id, key),\n        })),\n        onUpload: (e)=>this.uploadArt(c.id, e),\n        onW: (e)=>this.setArtField(c.id,'w',e.target.value),\n        onTop: (e)=>this.setArtField(c.id,'top',e.target.value),\n        onRight: (e)=>this.setArtField(c.id,'right',e.target.value),\n      };\n    });\n    const serviceRows = s.services.map(x=>({\n      minutes: x.minutes,\n      price: x.price,\n      onMin: (e)=>this.updateService(x.id,'minutes',e.target.value),\n      onPrice: (e)=>this.updateService(x.id,'price',e.target.value),\n      onDelete: ()=>this.deleteService(x.id),\n    }));\n\n    return {\n      providerName: s.providerName,\n      paypal: s.paypal,\n      clientChips, serviceChips, clientRows, serviceRows,\n      dateISO: s.dateISO,\n      invoiceNumValue: numValue,\n      clientName: client ? client.name : '',\n      dateLong: this.fmtDate(s.dateISO),\n      description: 'Telehealth therapy session - ' + minutes + 'min',\n      priceFmt,\n      accent,\n      hasArt, artSrc: cArt.src || '', artStyle,\n      scale: s.scale, boxW: s.boxW, boxH: s.boxH,\n      modalClients: s.modal === 'clients',\n      modalSettings: s.modal === 'settings',\n      setDate: (e)=>this.setDate(e),\n      setNum: (e)=>this.setNum(e),\n      openClients: ()=>this.openClients(),\n      openSettings: ()=>this.openSettings(),\n      closeModal: ()=>this.closeModal(),\n      stop: (e)=>e.stopPropagation(),\n      addClient: ()=>this.addClient(),\n      addService: ()=>this.addService(),\n      onProvider: (e)=>this.setState({ providerName: e.target.value }),\n      onPaypal: (e)=>this.setState({ paypal: e.target.value }),\n      generate: ()=>this.generate(),\n      setWrap: (el)=>{ this.wrapEl = el; },\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
